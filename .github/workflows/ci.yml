name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build staging
        run: npm run build:staging
        env:
          VITE_API_BASE_URL: https://api-staging.sentimospadel.com
          VITE_GEMINI_API_KEY: ""

      - name: Build production
        run: npm run build:production
        env:
          VITE_API_BASE_URL: https://api.sentimospadel.com
          VITE_GEMINI_API_KEY: ""

      - name: Build Docker image
        run: docker build --build-arg VITE_API_BASE_URL=https://api-staging.sentimospadel.com -t sentimospadel-frontend:ci .
